<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UI Elements Playground</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background:midnightblue;
    color: #e5e7eb;
    margin: 0;
}

/* CONTAINER */
.container {
    max-width: 1100px;
    margin: auto;
    padding: 40px;
}

/* TITLE */
h1 {
    text-align: center;
    color: red;
    margin-bottom: 30px;
}

/* CARD */
.card {
    background: rgb(182, 158, 168);
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

/* INPUTS */
input, textarea, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 6px;
    border: none;
    background: white;
    color: black;
}

/* INLINE */
.inline-group {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 6px 0;
}

.inline-group input {
    width: auto;
}

/* BUTTON */
button {
    padding: 10px 15px;
    border-radius: 6px;
    border: none;
    background: #6366f1;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #4f46e5;
}

button:disabled {
    background: gray;
}

/* LINK */
.link {
    color: #93c5fd;
}

/* DISABLED CURSOR */
input:disabled,
button:disabled,
select:disabled,
textarea:disabled {
    cursor: not-allowed;
}

.inline-group input:disabled + label {
    cursor: not-allowed;
}

.link.disabled {
    pointer-events: none;
    cursor: not-allowed;
    opacity: 0.6;
}

/* GRID */
.image-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 25px;
}

/* FLIP */
.flip-card {
    perspective: 1000px;
}

.flip-inner {
    position: relative;
    width: 100%;
    height: 180px;
    transform-style: preserve-3d;
    transition: transform 0.6s;
}

.flip-card:hover .flip-inner {
    transform: rotateY(180deg);
}

/* FRONT + BACK */
.front, .back {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 10px;
    backface-visibility: hidden;
}

.front img, .back img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 10px;
}

/* COUNTRY NAME */
.country-name {
    position: absolute;
    bottom: 10px;
    left: 10px;
    background: rgba(0,0,0,0.6);
    color: white;
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 14px;
}

/* BACK */
.back {
    transform: rotateY(180deg);
}
</style>
</head>

<body>

<div class="container">

<h1>✨ UI Elements Playground</h1>

<!-- TEXT -->
<div class="card">
<h3>Text Inputs</h3>
<input placeholder="Enter your name">
<input placeholder="Enter your email">
<textarea placeholder="Enter your message"></textarea>
</div>

<!-- CALENDAR -->
<div class="card">
<h3>Calendar</h3>
<input type="date">
<input type="datetime-local">
</div>

<!-- RADIO -->
<div class="card">
<h3>Radio Buttons</h3>
<div class="inline-group">
<input type="radio" name="gender">
<label>Male</label>
</div>
<div class="inline-group">
<input type="radio" name="gender">
<label>Female</label>
</div>
</div>

<!-- CHECKBOX -->
<div class="card">
<h3>Checkbox</h3>
<div class="inline-group">
<input type="checkbox">
<label>Accept Terms</label>
</div>
<div class="inline-group">
<input type="checkbox">
<label>Subscribe</label>
</div>
</div>

<!-- DROPDOWN -->
<div class="card">
<h3>Dropdown</h3>
<select>
<option>Select Country</option>
<option>India</option>
<option>USA</option>
<option>Germany</option>
</select>
</div>

<!-- BUTTONS -->
<div class="card">
<h3>Buttons</h3>
<button onclick="alert('Clicked')">Click</button>
<button ondblclick="alert('Double Clicked')">Double Click</button>
</div>

<!-- DISABLED -->
<div class="card">
<h3>Disabled Elements</h3>
<input disabled placeholder="Disabled Input">
<button disabled>Disabled Button</button>
<br><br>
<a class="link disabled">Disabled Link</a>

<div class="inline-group">
<input type="checkbox" disabled>
<label>Disabled Checkbox</label>
</div>

<div class="inline-group">
<input type="radio" disabled>
<label>Disabled Radio</label>
</div>
</div>

<!-- FLIP -->
