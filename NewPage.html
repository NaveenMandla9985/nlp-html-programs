<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background:midnightblue;
    color: #e5e7eb;
    margin: 0;
}

/* CONTAINER */
.container {
    max-width: 1100px;
    margin: auto;
    padding: 40px;
}

/* TITLE */
h1 {
    text-align: center;
    color: red;
    margin-bottom: 30px;
}

/* CARD */
.card {
    background: rgb(182, 158, 168);
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

/* INPUTS */
input, textarea, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 6px;
    border: none;
    background: white;
    color: black;
}

/* INLINE */
.inline-group {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 6px 0;
}

.inline-group input {
    width: auto;
}

/* BUTTON */
button {
    padding: 10px 15px;
    border-radius: 6px;
    border: none;
    background: #6366f1;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #4f46e5;
}

button:disabled {
    background: gray;
}

/* LINK */
.link {
    color: #93c5fd;
}

/* DISABLED CURSOR */
input:disabled,
button:disabled,
select:disabled,
textarea:disabled {
    cursor: not-allowed;
}

.inline-group input:disabled + label {
    cursor: not-allowed;
}

.link.disabled {
    pointer-events: none;
    cursor: not-allowed;
    opacity: 0.6;
}

/* GRID */
.image-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 25px;
}

/* FLIP */
.flip-card {
    perspective: 1000px;
}

.flip-inner {
    position: relative;
    width: 100%;
    height: 180px;
    transform-style: preserve-3d;
    transition: transform 0.6s;
}

.flip-card:hover .flip-inner {
    transform: rotateY(180deg);
}

/* FRONT + BACK */
.front, .back {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 10px;
    backface-visibility: hidden;
}

.front img, .back img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 10px;
}

/* COUNTRY NAME */
.country-name {
    position: absolute;
    bottom: 10px;
    left: 10px;
    background: rgba(0,0,0,0.6);
    color: white;
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 14px;
}

/* BACK */
.back {
    transform: rotateY(180deg);
}
</style>
</head>
