<!DOCTYPE html>
<html>
<head>
    <title>Security Demo</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }
        form {
            margin: 20px;
            padding: 20px;
            border: 1px solid #ccc;
            display: inline-block;
        }
        input {
            margin: 10px;
            padding: 8px;
        }
        button {
            padding: 8px 15px;
        }
        .msg {
            margin-top: 20px;
            font-weight: bold;
            color: blue;
        }
    </style>
</head>
<body>

<h2>🔐 Web Security Demo (SQL Injection)</h2>

<form action="/login-vulnerable" method="post">
    <h3>❌ Vulnerable Login</h3>
    <input name="username" placeholder="Username" required><br>
    <input name="password" placeholder="Password" required><br>
    <button type="submit">Login</button>
</form>

<form action="/login-secure" method="post">
    <h3>✅ Secure Login</h3>
    <input name="username" placeholder="Username" required><br>
    <input name="password" placeholder="Password" required><br>
    <button type="submit">Login</button>
</form>

<div class="msg">
    <p th:text="${message}"></p>
</div>

<hr>

<h3>💡 Try SQL Injection:</h3>
<p><b>Username:</b> ' OR '1'='1</p>
<p><b>Password:</b> anything</p>

</body>
</html>
